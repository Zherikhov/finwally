spring.config.import = optional:application.secure.properties

spring.application.name=finwally

spring.datasource.url=${psql.url}
spring.datasource.username=${psql.username}
spring.datasource.password=${psql.password}

server.port=8080
server.address=0.0.0.0

spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging configuration
logging.file.path=logs
logging.level.root=info